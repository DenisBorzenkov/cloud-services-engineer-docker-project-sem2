name: momo-store

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=momo-store_edge-net
      - --entrypoints.web.address=:80
      - --entrypoints.traefik.address=:8080
      - --accesslog=true
      - --log.level=INFO
      - --ping=true
    ports:
      - "${EDGE_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8090}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge-net
    <<: *default-security
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure
        max_attempts: 5
    logging: *default-logging

  backend:
    image: ${DOCKER_USER:-local}/docker-project-backend:${BACKEND_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GO_VERSION: "1.22"
        ALPINE_VERSION: "3.20"
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      TZ: ${TZ:-UTC}
      API_TOKEN_FILE: /run/secrets/api_token
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
    secrets:
      - api_token
      - metrics_token
    networks:
      - edge-net
      - backend-net
    read_only: true
    tmpfs:
      - /tmp:size=32M,mode=1777
    <<: *default-security
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=momo-store_edge-net
      - traefik.http.routers.backend.rule=PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.priority=100
      - traefik.http.routers.backend.middlewares=backend-strip
      - traefik.http.middlewares.backend-strip.stripprefix.prefixes=/api
      - traefik.http.services.backend.loadbalancer.server.port=8081
      - traefik.http.services.backend.loadbalancer.healthcheck.path=/health
      - traefik.http.services.backend.loadbalancer.healthcheck.interval=15s
    deploy:
      replicas: ${BACKEND_REPLICAS:-1}
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
      restart_policy:
        condition: on-failure
        max_attempts: 5
    logging: *default-logging

  frontend:
    image: ${DOCKER_USER:-local}/docker-project-frontend:${FRONTEND_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "16"
        NGINX_VERSION: "1.27"
        VUE_APP_API_URL: ${VUE_APP_API_URL:-/api}
    restart: unless-stopped
    expose:
      - "80"
    environment:
      TZ: ${TZ:-UTC}
    depends_on:
      backend:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - edge-net
      - backend-net
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32M,mode=0770,uid=10001,gid=10001
      - /var/run:size=8M,mode=0770,uid=10001,gid=10001
      - /var/log/nginx:size=16M,mode=0770,uid=10001,gid=10001
    <<: *default-security
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=momo-store_edge-net
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
      - traefik.http.services.frontend.loadbalancer.healthcheck.path=/healthz
      - traefik.http.services.frontend.loadbalancer.healthcheck.interval=15s
    deploy:
      replicas: ${FRONTEND_REPLICAS:-1}
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure
        max_attempts: 5
    logging: *default-logging

  trivy:
    profiles: ["security"]
    image: aquasec/trivy:0.52.2
    container_name: momo-trivy
    command:
      - image
      - --severity
      - HIGH,CRITICAL
      - --exit-code
      - "1"
      - --ignore-unfixed
      - ${DOCKER_USER:-local}/docker-project-backend:${BACKEND_TAG:-latest}
    volumes:
      - trivy-cache:/root/.cache
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend-net
    logging: *default-logging

networks:
  edge-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true

volumes:
  trivy-cache:
    driver: local

secrets:
  api_token:
    file: ./secrets/api_token.txt
  metrics_token:
    file: ./secrets/metrics_token.txt
